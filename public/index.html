<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Fleet KM Logger</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Photo area ── */
    #photo-wrap {
      width: 100%;
      background: #000;
      position: relative;
    }
    #photo-wrap input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
    #preview {
      width: 100%;
      max-height: 55dvh;
      object-fit: contain;
      display: none;
      transition: max-height 0.2s ease;
    }
    #preview.compact { max-height: 27dvh; }
    #placeholder {
      width: 100%;
      height: 42dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #475569;
      background: #1e293b;
    }
    #placeholder svg { width: 52px; height: 52px; opacity: 0.35; }
    #placeholder span { font-size: 0.9rem; }

    /* ── Controls ── */
    #controls {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      align-items: center;
    }
    .btn {
      flex: 1;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, opacity 0.15s;
    }
    .btn:hover:not(:disabled) { filter: brightness(1.15); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-ghost   { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #fff4;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #reading-status {
      color: #94a3b8;
      font-size: 0.9rem;
      display: none;
      align-items: center;
    }

    /* ── Result ── */
    #result {
      display: none;
      padding: 20px 16px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .result-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #64748b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }
    .badge-high { background: #14532d; color: #4ade80; }
    .badge-low  { background: #713f12; color: #fbbf24; }
    .badge-none { background: #450a0a; color: #f87171; }

    .km-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 0;
    }
    #km-input {
      font-size: 1.6rem;
      font-weight: 800;
      color: #f1f5f9;
      background: transparent;
      border: none;
      border-bottom: 2px solid #334155;
      width: 100%;
      padding: 0;
      letter-spacing: -1px;
      -moz-appearance: textfield;
      transition: border-color 0.2s;
    }
    #km-input::-webkit-outer-spin-button,
    #km-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    #km-input:focus { outline: none; border-bottom-color: #3b82f6; }
    .km-unit {
      font-size: 1.2rem;
      color: #64748b;
      flex-shrink: 0;
      padding-bottom: 6px;
    }
    .km-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      padding-bottom: 4px;
    }
    .km-action {
      width: 44px; height: 44px;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.15s;
    }
    .km-action:hover { filter: brightness(1.2); }
    .km-action-confirm { background: #14532d; }
    .km-action-cancel  { background: #450a0a; }

    /* ── Log ── */
    #log { flex: 1; padding: 16px; }
    #log h2 {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #475569;
      margin-bottom: 12px;
    }
    .log-entry {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #1e293b;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-thumb { width: 54px; height: 54px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .log-km   { font-size: 1.15rem; font-weight: 700; }
    .log-meta { font-size: 0.72rem; color: #64748b; margin-top: 3px; }
  </style>
</head>
<body>

<!-- Photo / viewfinder -->
<div id="photo-wrap">
  <input type="file" id="file-input" accept="image/*" />
  <img id="preview" alt="" />
  <div id="placeholder">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175
           C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15
           A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169
           a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055
           l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0
           2.192 2.192 0 00-1.736 1.039l-.821 1.316z" />
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0z" />
    </svg>
    <span>Tap to upload · or use Camera button</span>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="btn btn-ghost" id="camera-btn">📷 Camera</button>
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" />
  <span id="reading-status"><span class="spinner"></span>Reading…</span>
</div>

<!-- Result -->
<div id="result">
  <div class="result-label">
    Reading
    <span id="conf-badge" class="badge"></span>
  </div>
  <div class="km-row">
    <input type="number" id="km-input" min="0" placeholder="—" />
    <span class="km-unit">km</span>
    <div class="km-actions">
      <button class="km-action km-action-confirm" id="btn-confirm" title="Confirm">✓</button>
      <button class="km-action km-action-cancel"  id="btn-retake"  title="Retake">✕</button>
    </div>
  </div>
</div>

<!-- Log -->
<div id="log" style="display:none">
  <h2>Session log</h2>
  <div id="log-entries"></div>
</div>

<script>
  const fileInput     = document.getElementById('file-input');
  const cameraBtn     = document.getElementById('camera-btn');
  const cameraInput   = document.getElementById('camera-input');
  const preview       = document.getElementById('preview');
  const placeholder   = document.getElementById('placeholder');
  const readingStatus = document.getElementById('reading-status');
  const resultDiv     = document.getElementById('result');
  const confBadge     = document.getElementById('conf-badge');
  const kmInput       = document.getElementById('km-input');
  const btnRetake     = document.getElementById('btn-retake');
  const btnConfirm    = document.getElementById('btn-confirm');
  const logDiv        = document.getElementById('log');
  const logEntries    = document.getElementById('log-entries');

  let currentFile = null;
  let currentConf = 'none';

  // ── File upload (tap placeholder) ─────────────────────────────────────────
  fileInput.addEventListener('change',   () => { if (fileInput.files[0])   setFile(fileInput.files[0]); });
  cameraInput.addEventListener('change', () => { if (cameraInput.files[0]) setFile(cameraInput.files[0]); });

  // ── Camera via getUserMedia ────────────────────────────────────────────────
  cameraBtn.addEventListener('click', () => cameraInput.click());

  // ── Set file → show preview → OCR ─────────────────────────────────────────
  function setFile(file) {
    if (!file?.type.startsWith('image/')) return;
    currentFile = file;
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    resultDiv.style.display = 'none';
    readOcr();
  }

  function resizeToBase64(file, maxWidth = 1600) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.readAsDataURL(blob);
        }, 'image/jpeg', 0.88);
      };
      img.src = URL.createObjectURL(file);
    });
  }

  async function readOcr() {
    cameraBtn.style.display = 'none';
    readingStatus.style.display = 'flex';

    try {
      const image = await resizeToBase64(currentFile);
      const resp  = await fetch('/api/ocr', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ image, mimeType: 'image/jpeg' }),
      });
      const data = await resp.json();
      if (!resp.ok) { alert(data.error + (data.detail ? '\n\n' + data.detail : '')); reset(); return; }
      showResult(data.result);
    } catch (err) {
      alert('Request failed: ' + err.message);
      reset();
    } finally {
      readingStatus.style.display = 'none';
    }
  }

  // ── Result ─────────────────────────────────────────────────────────────────
  function badgeClass(c) {
    return c === 'high' ? 'badge-high' : c === 'low' ? 'badge-low' : 'badge-none';
  }

  function showResult(result) {
    currentConf = result?.confidence ?? 'none';
    kmInput.value = result?.km ?? '';
    confBadge.textContent = currentConf;
    confBadge.className   = 'badge ' + badgeClass(currentConf);
    resultDiv.style.display = 'block';
    preview.classList.add('compact');
  }

  function reset() {
    currentFile = null;
    preview.style.display = 'none';
    preview.classList.remove('compact');
    placeholder.style.display = 'flex';
    resultDiv.style.display = 'none';
    cameraBtn.style.display = '';
    fileInput.value = '';
    cameraInput.value = '';
  }

  btnRetake.addEventListener('click', reset);

  btnConfirm.addEventListener('click', () => {
    const val = parseInt(kmInput.value, 10);
    if (isNaN(val) || val < 0) {
      kmInput.style.borderBottomColor = '#ef4444';
      setTimeout(() => kmInput.style.borderBottomColor = '', 800);
      return;
    }
    addLog(currentFile, val, currentConf);
    reset();
  });

  // ── Log ────────────────────────────────────────────────────────────────────
  function addLog(file, km, conf) {
    logDiv.style.display = 'block';
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    const thumb = document.createElement('img');
    thumb.className = 'log-thumb';
    thumb.src = URL.createObjectURL(file);
    const info = document.createElement('div');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    info.innerHTML = `
      <div class="log-km">${km.toLocaleString()} km</div>
      <div class="log-meta">
        <span class="badge ${badgeClass(conf)}" style="padding:2px 7px;font-size:0.62rem">${conf}</span>
        &nbsp;${time}
      </div>`;
    entry.appendChild(thumb);
    entry.appendChild(info);
    logEntries.prepend(entry);
  }
</script>

</body>
</html>
